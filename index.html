<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>📝 My Tasks</h1>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <span id="progressText" class="progress-text">0 / 0 done</span>
      </div>
    </header>

    <div class="input-row">
      <input id="taskInput" type="text" placeholder="What needs to be done?" maxlength="120" />
      <select id="prioritySelect">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button id="addBtn">Add</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
      <button id="clearDoneBtn" class="btn-clear">Clear Done</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
    <div id="emptyState" class="empty-state hidden">
      <span>🎉</span>
      <p>Nothing here! Add a task above.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
